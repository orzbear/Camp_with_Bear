name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Generate types
        run: |
          cd frontend
          npm run gen:types
      - name: Type check
        run: |
          cd frontend
          tsc --noEmit
      - name: Build
        run: |
          cd frontend
          npm run build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd api
          npm ci
      - name: Build
        run: |
          cd api
          npm run build

  rag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd rag
          pip install -r requirements.txt
      - name: Compile check
        run: |
          cd rag
          python -m py_compile app.py

