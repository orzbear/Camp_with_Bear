name: CD - Deploy to AWS ECS

on:
  push:
    branches: [ main ]
  # This ensures deployment only happens AFTER CI passes
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  ECR_FRONTEND_REPO: campmate-frontend
  ECR_API_REPO: campmate-api
  ECS_SERVICE_FRONTEND: campmate-dev-frontend
  ECS_SERVICE_API: campmate-dev-api
  ECS_CLUSTER: campmate-dev-cluster

jobs:
  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- DEPLOY FRONTEND ---
      - name: Build and Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/arm64 \
            -t $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:latest \
            -f docker/frontend/Dockerfile --push .
          echo "frontend_image=$ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS Frontend Service
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_FRONTEND }} --force-new-deployment

      # --- DEPLOY API ---
      - name: Build and Push API
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/arm64 \
            -t $ECR_REGISTRY/${{ env.ECR_API_REPO }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_API_REPO }}:latest \
            -f docker/api/Dockerfile --push .

      - name: Update ECS API Service
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_API }} --force-new-deployment