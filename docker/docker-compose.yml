version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/trailwise
      - JWT_SECRET=dev_change_me
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rag:
    build:
      context: ..
      dockerfile: docker/rag/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - RAG_VERSION=0.0.1

volumes:
  mongo_data:

