version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  rag:
    build:
      context: ..
      dockerfile: docker/rag/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - RAG_VERSION=0.0.1

